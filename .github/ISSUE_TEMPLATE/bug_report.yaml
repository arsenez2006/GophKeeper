name: "Bug Report"
description: Report a bug or unexpected behavior in the system
title: "fix: [Short bug description]"
labels: ["triage", "bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 📝 Description
      description: Clear and concise description of what the bug is. What is the current behavior vs expected behavior?
      placeholder: "Current behavior: ...\nExpected behavior: ..."
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 🎯 Scope
      description: Which component is affected by this bug?
      options:
        - Backend API
        - CLI Application
        - Both / Infrastructure
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: 🔄 Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: "1. Run command '...'\n2. See error '...'"
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 🔗 References & Logs
      description: Provide relevant logs, error stack traces, screenshots, network requests, or links to related tasks/incidents.
      placeholder: "Error trace:\n[ERROR] ...\n\nRelated incident/issue: #"
    validations:
      required: false
